name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # npm install (not npm ci) because the repo intentionally has no lockfile yet
      - run: npm install
      - run: npm test
      - run: npm run build
